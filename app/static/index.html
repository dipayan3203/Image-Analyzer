<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Image Analyzer</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], select { padding: 8px; width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; white-space: pre-wrap; background: #fff; padding: 15px; border: 1px solid #eee; border-radius: 4px; min-height: 50px; }
        .preview { max-width: 100%; margin-top: 10px; max-height: 300px; object-fit: contain; display: block; }
    </style>
</head>
<body>
    <h1>Gemini Image Analyzer</h1>
    <div class="container">
        <div class="form-group">
            <label for="analysisType">Analysis Type:</label>
            <select id="analysisType">
                <option value="general">General Analysis</option>
                <option value="classification">Classification</option>
                <option value="extraction">Text Extraction</option>
                <option value="jewelry">Jewelry Analysis</option>
            </select>
        </div>

        <div class="form-group">
            <label for="fileInput">Select Image:</label>
            <input type="file" id="fileInput" accept="image/*">
            <img id="imagePreview" class="preview" style="display:none;">
        </div>

        <button onclick="analyzeImage()">Analyze Image</button>

        <h3>Result:</h3>
        <div id="result">Results will appear here...</div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('imagePreview');

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        async function analyzeImage() {
            const file = fileInput.files[0];
            const type = document.getElementById('analysisType').value;
            const resultDiv = document.getElementById('result');

            if (!file) {
                alert("Please select an image");
                return;
            }

            resultDiv.textContent = "Analyzing...";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('analysis_type', type);

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.textContent = "Error: " + error.message;
            }
        }
    </script>
</body>
</html>
